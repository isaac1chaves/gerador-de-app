name: Release Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: renapsi-electron-transparente-v3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build and publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release

      - name: Upload dist as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: renapsi-electron-transparente-v3/dist/**
          retention-days: 7
